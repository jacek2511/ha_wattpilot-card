name: Build Wattpilot Card

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Rozwiązuje problem deprecji Node 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24 # Ustawiamy najnowszą wersję
          # Usunęliśmy linię cache: 'npm', bo nie masz pliku package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Upload compiled JS
        uses: actions/upload-artifact@v4
        with:
          name: wattpilot-card-js
          path: dist/wattpilot-card.js
          overwrite: true
